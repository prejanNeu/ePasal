{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'css/register.css' %}">
    <title>Register</title>

</head>

<body>
    <div>
        <h1>Register</h1>
        <form method="POST">

            {% csrf_token %}

            <label for="name">Name</label>
            <input type="text" name="name" id="name" required><br><br>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" required><br><br>

            <label>
                <input type="radio" name="role" value="seller" onclick="field()">
                <span class="radio"></span>
                    Seller
            </label><br><br>

            <label>
                <input type="radio" name="role" value="buyer" onclick="field()">
                <span class="radio"></span>
                Buyer
            </label><br><br>

            <!-- Teacher-specific fields -->
            

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required><br><br>
            <input type="submit" value="Register" id="register_btn">

            <div class="links">
                <a href="{% url 'login_page' %}">Login Account</a>
                <a href="/forgot-password" id="forgot-password">Forgot Password?</a>
                <a href="{% url 'home_page' %}" id="login_avvount">Home Page</a>
                
            </div>

        </form>
    </div>
</body>

</html>
