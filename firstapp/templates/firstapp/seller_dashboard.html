{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/seller_dashboard.css' %}">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="/">Home</a>
        <a href="{% url 'login_page' %}">Login</a>
        <a href="{% url 'register_page' %}">Register</a>
        <a href="{% url 'product_page'%}">Products</a>
        <a href="{% url 'seller_dashboard'%}">Dashboard</a>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h1>Welcome, {{ seller.company_name }}</h1>
        <p>Seller: {{ seller.user.username }}</p>

        <!-- Product Form -->
        <div class="form-container">
            <h2>Add Product</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label for="name">Enter Product Name</label>
                    <input type="text" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Enter Description</label>
                    <input type="text" name="description">
                </div>

                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" name="price" required>
                </div>

                <div class="form-group">
                    <label for="image">Product Image</label>
                    <input type="file" name="image">
                </div>

                <button type="submit" class="submit-btn">Add Product</button>
            </form>
        </div>
    </div>

</body>
</html>
