{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ePasal - Products</title>
  <link rel="stylesheet" type="text/css" href="{% static 'css/product.css' %}">
</head>
<body>
  <!-- Navigation Bar -->
  <nav>
    <a href="/">Home</a>
    <a href="{% url 'login_page' %}">Login</a>
    <a href="{% url 'register_page' %}">Register</a>
    <a href="{% url 'product_page' %}">Products</a>
  </nav>

  <!-- Banner Section -->
  <header>
    <div class="banner">
      <h2>Discover the Latest Fashion</h2>
      <button class="shop-now">Shop Now</button>
    </div>
  </header>

  <!-- Product Section -->
  <section class="products">
    <h2>Our Products</h2>
    <div class="product-grid">
      <!-- Loop through the products -->
      {% for product in products %}
      <div class="product-card">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>{{ product.price }}</p>
        <button class="add-to-cart" onclick="addToCart()">Add to Cart</button>
      </div>
      {% endfor %}
    </div>
  </section>

  <!-- Cart Icon -->
  <div class="cart-icon">
    <img id="cart" src="https://w7.pngwing.com/pngs/317/428/png-transparent-shopping-cart-computer-icons-add-to-cart-button-angle-text-service-thumbnail.png" alt="Cart">
    <span class="cart-count">0</span>
  </div>

  <script>
    // Simple cart functionality
    let cartCount = 0;

    function addToCart() {
      cartCount++;
      document.querySelector('.cart-count').innerText = cartCount;
      alert('Item added to cart!');
    }
  </script>
</body>
</html>
